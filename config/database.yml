# PostgreSQL configuration for GNAF data import
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: gnaf_data_development
  username: <%= ENV.fetch("DATABASE_USER") { ENV["USER"] } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: localhost
  port: 5432

test:
  <<: *default
  database: gnaf_data_test
  username: <%= ENV.fetch("DATABASE_USER") { ENV["USER"] } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: localhost
  port: 5432

production:
  primary:
    <<: *default
    database: gnaf_data_production
    username: <%= ENV["DATABASE_USER"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  cache:
    <<: *default
    database: gnaf_data_production_cache
    username: <%= ENV["DATABASE_USER"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: gnaf_data_production_queue
    username: <%= ENV["DATABASE_USER"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: gnaf_data_production_cable
    username: <%= ENV["DATABASE_USER"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
    port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
    migrations_paths: db/cable_migrate
